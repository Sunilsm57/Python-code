[environments.production]
name = "production"

[environments.production.build]
builder = "dockerfile"
watchPathIgnores = ["__pycache__", "*.pyc", ".env"]

[environments.production.deploy]
restartPolicy = "on-failure"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
numReplicas = 1

[[environments.production.services]]
name = "python-api"
type = "web"
image = "python:3.11-slim"

[environments.production.service.healthCheck]
method = "GET"
path = "/"
